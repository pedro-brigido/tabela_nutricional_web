{% extends "base.html" %}
{% block title %}Contato | Terracota{% endblock %}
{% block content %}
{% set pf = prefill if prefill is defined else {} %}
<div class="max-w-lg mx-auto">
    <h1 class="text-3xl font-heading font-bold mb-8 text-center">Fale Conosco</h1>

    <div class="bg-terracota-surface/80 backdrop-blur-xl border border-white/10 rounded-2xl p-8">
        <form method="post" action="{{ url_for('support.contact') }}" class="space-y-4">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div>
                <label class="block text-sm text-terracota-textMuted mb-1">Nome</label>
                <input type="text" name="name" required value="{{ pf.get('name', current_user.name if current_user.is_authenticated else '') }}"
                    class="w-full px-4 py-3 bg-terracota-surfaceHighlight border border-white/10 rounded-xl text-white focus:outline-none focus:border-terracota-cyan/50 transition-all">
            </div>
            <div>
                <label class="block text-sm text-terracota-textMuted mb-1">E-mail</label>
                <input type="email" name="email" required value="{{ pf.get('email', current_user.email if current_user.is_authenticated else '') }}"
                    class="w-full px-4 py-3 bg-terracota-surfaceHighlight border border-white/10 rounded-xl text-white focus:outline-none focus:border-terracota-cyan/50 transition-all">
            </div>
            <div>
                <label class="block text-sm text-terracota-textMuted mb-1">Categoria</label>
                <select name="category" class="w-full px-4 py-3 bg-terracota-surfaceHighlight border border-white/10 rounded-xl text-white focus:outline-none focus:border-terracota-cyan/50 transition-all">
                    <option value="other" {{ 'selected' if pf.get('category', 'other') == 'other' }}>Geral</option>
                    <option value="billing" {{ 'selected' if pf.get('category') == 'billing' }}>Planos / Cobrança</option>
                    <option value="bug" {{ 'selected' if pf.get('category') == 'bug' }}>Reportar Problema</option>
                    <option value="feature" {{ 'selected' if pf.get('category') == 'feature' }}>Sugestão</option>
                    <option value="account" {{ 'selected' if pf.get('category') == 'account' }}>Minha Conta</option>
                </select>
            </div>
            <div>
                <label class="block text-sm text-terracota-textMuted mb-1">Assunto</label>
                <input type="text" name="subject" value="{{ pf.get('subject', '') }}"
                    class="w-full px-4 py-3 bg-terracota-surfaceHighlight border border-white/10 rounded-xl text-white focus:outline-none focus:border-terracota-cyan/50 transition-all">
            </div>
            <div>
                <label class="block text-sm text-terracota-textMuted mb-1">Mensagem</label>
                <textarea name="message" rows="5" required
                    class="w-full px-4 py-3 bg-terracota-surfaceHighlight border border-white/10 rounded-xl text-white focus:outline-none focus:border-terracota-cyan/50 transition-all resize-none">{{ pf.get('message', '') }}</textarea>
            </div>
            <button type="submit" class="w-full px-6 py-3 bg-terracota-cyan text-terracota-base font-semibold rounded-xl hover:bg-white transition-colors">
                Enviar mensagem
            </button>
        </form>
    </div>
</div>
{% endblock %}
