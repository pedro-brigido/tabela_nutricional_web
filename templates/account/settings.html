{% extends "base.html" %}
{% block title %}Configurações | Terracota{% endblock %}
{% block content %}
<h1 class="text-3xl font-heading font-bold mb-8">Configurações</h1>

<div class="space-y-8 max-w-lg">
    <div class="bg-terracota-surface border border-white/10 rounded-2xl p-6">
        <h2 class="text-lg font-heading font-semibold mb-4">Dados pessoais</h2>
        <form method="post" action="{{ url_for('account.settings') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-4">
                <label class="block text-sm text-terracota-textMuted mb-1">Nome</label>
                <input type="text" name="name" value="{{ current_user.name }}" required
                    class="w-full px-4 py-3 bg-terracota-surfaceHighlight border border-white/10 rounded-xl text-white focus:outline-none focus:border-terracota-cyan/50 transition-all">
            </div>
            <div class="mb-4">
                <label class="block text-sm text-terracota-textMuted mb-1">E-mail</label>
                <input type="email" value="{{ current_user.email }}" disabled
                    class="w-full px-4 py-3 bg-terracota-surfaceHighlight/50 border border-white/5 rounded-xl text-terracota-textMuted cursor-not-allowed">
            </div>
            <button type="submit" class="px-6 py-2.5 bg-terracota-cyan text-terracota-base font-semibold rounded-xl hover:bg-white transition-colors">Salvar</button>
        </form>
    </div>

    {% if current_user.password_hash %}
    <div class="bg-terracota-surface border border-white/10 rounded-2xl p-6">
        <h2 class="text-lg font-heading font-semibold mb-4">Alterar senha</h2>
        <form method="post" action="{{ url_for('account.change_password') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-4">
                <label class="block text-sm text-terracota-textMuted mb-1">Senha atual</label>
                <input type="password" name="current_password" required
                    class="w-full px-4 py-3 bg-terracota-surfaceHighlight border border-white/10 rounded-xl text-white focus:outline-none focus:border-terracota-cyan/50 transition-all">
            </div>
            <div class="mb-4">
                <label class="block text-sm text-terracota-textMuted mb-1">Nova senha (mín. 8 caracteres)</label>
                <input type="password" name="new_password" required minlength="8"
                    class="w-full px-4 py-3 bg-terracota-surfaceHighlight border border-white/10 rounded-xl text-white focus:outline-none focus:border-terracota-cyan/50 transition-all">
            </div>
            <div class="mb-4">
                <label class="block text-sm text-terracota-textMuted mb-1">Confirmar nova senha</label>
                <input type="password" name="confirm_password" required minlength="8"
                    class="w-full px-4 py-3 bg-terracota-surfaceHighlight border border-white/10 rounded-xl text-white focus:outline-none focus:border-terracota-cyan/50 transition-all">
            </div>
            <button type="submit" class="px-6 py-2.5 bg-terracota-cyan text-terracota-base font-semibold rounded-xl hover:bg-white transition-colors">Alterar senha</button>
        </form>
    </div>
    {% endif %}

    <div class="bg-terracota-surface border border-red-500/20 rounded-2xl p-6">
        <h2 class="text-lg font-heading font-semibold mb-4 text-red-300">Zona de perigo</h2>
        <div class="flex flex-col sm:flex-row gap-4">
            <form method="post" action="{{ url_for('account.export_data') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <button type="submit" class="px-4 py-2 border border-white/10 rounded-lg text-sm text-terracota-textMuted hover:text-white hover:bg-white/5 transition-colors">Exportar meus dados</button>
            </form>
            <form method="post" action="{{ url_for('account.delete_account') }}" onsubmit="return confirm('Tem certeza? Sua conta será marcada para exclusão.')">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                {% if current_user.password_hash %}
                <input type="password" name="password" placeholder="Confirme sua senha" required class="px-3 py-2 bg-terracota-surfaceHighlight border border-white/10 rounded-lg text-white text-sm mr-2">
                {% endif %}
                <button type="submit" class="px-4 py-2 border border-red-500/30 rounded-lg text-sm text-red-300 hover:bg-red-500/10 transition-colors">Excluir conta</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
