{% extends "public/base_public.html" %}
{% block title %}Entrar | Terracota Compliance{% endblock %}
{% block content %}
<div class="px-6">
    <div class="w-full max-w-md mx-auto min-h-[calc(100vh-11rem)] flex items-center">
        <div class="w-full bg-terracota-surface/80 backdrop-blur-xl border border-white/10 rounded-2xl p-8 shadow-xl">
            <h1 class="text-2xl font-heading font-bold text-white mb-2">Entrar</h1>
            <p class="text-terracota-textMuted text-sm mb-6">Use sua conta para acessar a Calculadora Nutricional.</p>

            <form method="post" action="{{ url_for('auth.login') }}" class="space-y-4">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div>
                    <label for="email" class="block text-sm font-medium text-terracota-textMuted mb-1">E-mail</label>
                    <input type="email" id="email" name="email" required autocomplete="email"
                        class="w-full px-4 py-3 bg-terracota-surfaceHighlight border border-white/10 rounded-xl text-white placeholder-terracota-textMuted/50 focus:outline-none focus:border-terracota-cyan/50 focus:ring-1 focus:ring-terracota-cyan/50 transition-all"
                        placeholder="seu@email.com">
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-terracota-textMuted mb-1">Senha</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password"
                        class="w-full px-4 py-3 bg-terracota-surfaceHighlight border border-white/10 rounded-xl text-white placeholder-terracota-textMuted/50 focus:outline-none focus:border-terracota-cyan/50 focus:ring-1 focus:ring-terracota-cyan/50 transition-all"
                        placeholder="••••••••">
                </div>
                <button type="submit" class="w-full px-6 py-3 bg-terracota-cyan text-terracota-base font-semibold rounded-xl hover:bg-white transition-colors shadow-[0_0_20px_-5px_rgba(0,240,255,0.3)]">
                    Entrar
                </button>
            </form>

            <div class="relative my-6">
                <span class="absolute inset-0 flex items-center"><span class="w-full border-t border-white/10"></span></span>
                <span class="relative flex justify-center text-xs uppercase tracking-wider text-terracota-textMuted">ou</span>
            </div>

            <a href="{{ url_for('auth.google_login') }}" class="flex items-center justify-center gap-3 w-full px-6 py-3 bg-terracota-surfaceHighlight border border-white/10 rounded-xl text-white font-medium hover:bg-terracota-surface hover:border-white/20 transition-all">
                <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Entrar com Google
            </a>

            <p class="mt-4 text-center text-sm text-terracota-textMuted">
                <a href="{{ url_for('auth.forgot_password') }}" class="text-terracota-cyan/80 hover:underline">Esqueci minha senha</a>
            </p>
            <p class="mt-2 text-center text-sm text-terracota-textMuted">
                Não tem conta? <a href="{{ url_for('auth.register') }}" class="text-terracota-cyan hover:underline font-medium">Criar conta</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
