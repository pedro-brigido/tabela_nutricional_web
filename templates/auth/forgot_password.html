{% extends "public/base_public.html" %}
{% block title %}Esqueci minha senha | Terracota{% endblock %}
{% block content %}
<div class="px-6">
    <div class="max-w-md mx-auto min-h-[calc(100vh-11rem)] flex items-center">
        <div class="w-full bg-terracota-surface/80 backdrop-blur-xl border border-white/10 rounded-2xl p-8">
            <h1 class="text-2xl font-heading font-bold mb-2">Esqueci minha senha</h1>
            <p class="text-terracota-textMuted text-sm mb-6">Informe seu e-mail e enviaremos um link para redefinir sua senha.</p>

            <form method="post" action="{{ url_for('auth.forgot_password') }}" class="space-y-4">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div>
                    <label for="email" class="block text-sm text-terracota-textMuted mb-1">E-mail</label>
                    <input type="email" id="email" name="email" required autocomplete="email"
                        class="w-full px-4 py-3 bg-terracota-surfaceHighlight border border-white/10 rounded-xl text-white focus:outline-none focus:border-terracota-cyan/50 transition-all"
                        placeholder="seu@email.com">
                </div>
                <button type="submit" class="w-full px-6 py-3 bg-terracota-cyan text-terracota-base font-semibold rounded-xl hover:bg-white transition-colors">
                    Enviar link de redefinição
                </button>
            </form>

            <p class="mt-6 text-center text-sm text-terracota-textMuted">
                Lembrou a senha? <a href="{{ url_for('auth.login') }}" class="text-terracota-cyan hover:underline font-medium">Entrar</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
