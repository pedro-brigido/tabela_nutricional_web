{% extends "public/base_public.html" %}
{% block title %}Redefinir senha | Terracota{% endblock %}
{% block content %}
<div class="px-6">
    <div class="max-w-md mx-auto min-h-[calc(100vh-11rem)] flex items-center">
        <div class="w-full bg-terracota-surface/80 backdrop-blur-xl border border-white/10 rounded-2xl p-8">
            <h1 class="text-2xl font-heading font-bold mb-2">Nova senha</h1>
            <p class="text-terracota-textMuted text-sm mb-6">Defina uma nova senha para sua conta.</p>

            <form method="post" action="{{ url_for('auth.reset_password', token=token) }}" class="space-y-4">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div>
                    <label for="password" class="block text-sm text-terracota-textMuted mb-1">Nova senha (mín. 8 caracteres)</label>
                    <input type="password" id="password" name="password" required minlength="8"
                        class="w-full px-4 py-3 bg-terracota-surfaceHighlight border border-white/10 rounded-xl text-white focus:outline-none focus:border-terracota-cyan/50 transition-all">
                </div>
                <div>
                    <label for="password_confirm" class="block text-sm text-terracota-textMuted mb-1">Confirmar nova senha</label>
                    <input type="password" id="password_confirm" name="password_confirm" required minlength="8"
                        class="w-full px-4 py-3 bg-terracota-surfaceHighlight border border-white/10 rounded-xl text-white focus:outline-none focus:border-terracota-cyan/50 transition-all">
                </div>
                <button type="submit" class="w-full px-6 py-3 bg-terracota-cyan text-terracota-base font-semibold rounded-xl hover:bg-white transition-colors">
                    Redefinir senha
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
