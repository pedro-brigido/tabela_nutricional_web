name: CI-CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --extra dev

      - name: Run tests
        run: uv run pytest -q

  docker-smoke:
    name: Docker Smoke Build
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          tags: local/tabela-nutricional-web:smoke-${{ github.sha }}
          cache-from: type=gha,scope=smoke
          cache-to: type=gha,mode=max,scope=smoke

  build-push:
    name: Build & Push Production Image
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: [test, docker-smoke]
    permissions:
      contents: read
      packages: write
    outputs:
      image_ref: ${{ steps.image_ref.outputs.value }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=main
            type=sha,prefix=sha-

      - name: Build and push image
        id: build_push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=release
          cache-to: type=gha,mode=max,scope=release

      - name: Export immutable image ref
        id: image_ref
        run: echo "value=ghcr.io/${{ github.repository }}@${{ steps.build_push.outputs.digest }}" >> "$GITHUB_OUTPUT"

  deploy-production:
    name: Deploy Production (Hostinger VPS)
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: [build-push]
    environment: production
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "${{ secrets.VPS_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Resolve SSH port
        run: |
          if [ -n "${{ secrets.VPS_PORT }}" ]; then
            echo "VPS_PORT=${{ secrets.VPS_PORT }}" >> "$GITHUB_ENV"
          else
            echo "VPS_PORT=22" >> "$GITHUB_ENV"
          fi

      - name: Upload deploy assets
        run: |
          ssh -p "$VPS_PORT" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "mkdir -p /opt/terracota"
          scp -P "$VPS_PORT" deploy/docker-compose.prod.yml deploy/release.sh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/terracota/"

      - name: Run remote release
        run: |
          ssh -p "$VPS_PORT" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "chmod +x /opt/terracota/release.sh && IMAGE_REF='${{ needs.build-push.outputs.image_ref }}' GHCR_USERNAME='${{ secrets.GHCR_USERNAME }}' GHCR_READ_TOKEN='${{ secrets.GHCR_READ_TOKEN }}' /opt/terracota/release.sh"

