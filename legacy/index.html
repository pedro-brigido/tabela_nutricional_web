<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terracota | Calculadora Nutricional</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter & Syne -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- SheetJS -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Syne', 'sans-serif'],
                    },
                    colors: {
                        terracota: {
                            purple: '#442063',
                            darkPurple: '#2a1140',
                            deepDark: '#140a20',
                            blue: '#1d3263',
                            cyan: '#00c4cc',
                            cyanHover: '#00a0a6',
                            text: '#ffffff',
                            textLight: '#cccccc',
                        }
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-terracota-deepDark text-terracota-text font-sans antialiased min-h-screen flex flex-col">

    <!-- Header -->
    <header class="border-b border-white/10 backdrop-blur-md sticky top-0 z-10 bg-terracota-deepDark/50">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <!-- Simple Logo Placeholder matching style -->
                <div
                    class="w-10 h-10 rounded-lg bg-gradient-to-br from-terracota-purple to-terracota-cyan flex items-center justify-center text-white font-bold text-xl shadow-lg shadow-terracota-cyan/20">
                    T
                </div>
                <div class="flex flex-col">
                    <h1 class="text-2xl font-bold tracking-tight text-white font-heading uppercase">Terracota</h1>
                    <span class="text-[10px] tracking-[0.2em] text-terracota-cyan uppercase">Regulatório &
                        Compliance</span>
                </div>
            </div>
            <div
                class="text-xs font-medium text-terracota-textLight border border-white/10 px-3 py-1 rounded-full bg-white/5">
                Calculadora Nutricional MVP</div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow py-12 px-4 sm:px-6">
        <div class="max-w-4xl mx-auto bg-white/5 backdrop-blur-xl rounded-3xl border border-white/10 shadow-2xl overflow-hidden"
            id="app-container">

            <!-- Wizard Progress (Placement holder) -->
            <div id="wizard-progress" class="border-b border-white/5 p-8 bg-black/20">
                <!-- Progress steps will be injected here -->
            </div>

            <!-- Wizard Steps Container -->
            <div id="wizard-content" class="p-8 sm:p-12 min-h-[400px]">
                <!-- Step content will be injected here -->
                <div class="text-center py-20">
                    <p class="text-terracota-textLight animate-pulse">Carregando sistema...</p>
                </div>
            </div>

            <!-- Step Navigation -->
            <div class="border-t border-white/5 p-8 flex justify-between items-center bg-black/20">
                <button id="btn-back"
                    class="px-6 py-2.5 text-terracota-textLight font-medium hover:text-white hover:bg-white/5 rounded-lg transition-all disabled:opacity-50 disabled:cursor-not-allowed"
                    disabled>
                    Voltar
                </button>
                <button id="btn-next"
                    class="px-8 py-2.5 bg-terracota-cyan text-terracota-deepDark font-bold rounded-lg shadow-[0_0_20px_rgba(0,196,204,0.3)] hover:shadow-[0_0_30px_rgba(0,196,204,0.5)] hover:bg-white transition-all transform hover:-translate-y-0.5 disabled:opacity-50 disabled:cursor-not-allowed">
                    Continuar
                </button>
            </div>

        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-white/10 py-8 mt-auto bg-black/20">
        <div class="max-w-5xl mx-auto px-4 text-center text-terracota-textLight text-sm font-light">
            <p>&copy; 2026 Terracota. Todos os direitos reservados.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="anvisaCalculator.js"></script>
    <script src="script.js"></script>
</body>

</html>
